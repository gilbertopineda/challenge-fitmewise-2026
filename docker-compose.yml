version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitmewise_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./laravel:/var/www
    depends_on:
      - db
      - redis
    networks:
      - fitmewise_network

  webserver:
    image: nginx:alpine
    container_name: fitmewise_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./laravel:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - fitmewise_network

  db:
    image: mysql:8.0
    container_name: fitmewise_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - fitmewise_dbdata:/var/lib/mysql
    networks:
      - fitmewise_network

  redis:
    image: redis:7-alpine
    container_name: fitmewise_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - fitmewise_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitmewise_queue
    restart: unless-stopped
    working_dir: /var/www
    # command: php artisan queue:work --tries=3 --timeout=30
    volumes:
      - ./laravel:/var/www
    depends_on:
      - app
      - redis
    networks:
      - fitmewise_network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitmewise_scheduler
    restart: unless-stopped
    working_dir: /var/www
    # command: php artisan schedule:work
    volumes:
      - ./laravel:/var/www
    depends_on:
      - app
    networks:
      - fitmewise_network

volumes:
  fitmewise_dbdata:

networks:
  fitmewise_network:
    driver: bridge